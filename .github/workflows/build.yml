name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_call: {}

jobs:
  uberjar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: clj-

      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      # HumbleUI's native Skija lib requires libEGL (OpenGL ES) at load time.
      # Install a minimal stub so tools.deps can resolve the git dep without
      # triggering a native load error during AOT compilation.
      # infra.window is NOT AOT-compiled (see build.clj) so this is only
      # needed if any transitive require walks into humbleui namespaces.
      - name: Install libEGL stub (headless GPU shim)
        run: sudo apt-get install -y --no-install-recommends libegl1

      - name: Build uberjar (core AOT only)
        run: clojure -T:build uberjar

      - uses: actions/upload-artifact@v4
        with:
          name: uberjar
          path: target/*-standalone.jar

      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/*-standalone.jar
