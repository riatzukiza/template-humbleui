name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: clj-
      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
      - run: clojure -M:kondo

  test-unit:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: clj-
      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
      - run: clojure -M:test unit
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-results
          path: target/test-results/

  test-integration:
    name: Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: clj-
      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
      - run: clojure -M:test integration
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: target/test-results/

  test-e2e:
    name: E2E Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: clj-
      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
      - run: clojure -M:test e2e
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: target/test-results/

  build:
    name: Build Uberjar
    needs: [test-unit, test-integration, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: clj-
      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
      - run: clojure -T:build uberjar
      - uses: actions/upload-artifact@v4
        with:
          name: uberjar
          path: target/*-standalone.jar
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/*-standalone.jar
