name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kondo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: clj-
      - uses: DeLaGuardo/setup-clojure@12
        with:
          cli: latest
      - run: clojure -M:kondo
